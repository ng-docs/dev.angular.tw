    <p>大多數前端應用程式需要透過 HTTP 協定與伺服器進行通訊，以下載或上傳資料，並存取其他後端服務。Angular 為 Angular 應用程式提供了一個用戶端 HTTP API，位於 <code>@angular/common/http</code> 中的 <code>HttpClient</code> 服務類別。</p>

  <h2 id="http-">HTTP 客戶端服務特色</h2>
  <a href="#http-" class="docs-anchor" tabindex="-1" aria-label="Link to HTTP 客戶端服務特色"></a>
  <p>HTTP 客戶端服務提供以下主要功能：</p>

  <ul class="docs-list">
    <li>要求 <a href="guide/http/making-requests#fetching-json-data">型別化回應值</a> 的能力</li>
<li>精簡的 <a href="guide/http/making-requests#handling-request-failure">錯誤處理</a></li>
<li>要求和回應 <a href="guide/http/interceptors">攔截</a></li>
<li>健全的 <a href="guide/http/testing">測試工具</a></li>

  </ul>
