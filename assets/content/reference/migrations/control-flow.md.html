    <p><a href="guide/templates/control-flow">控制流程語法</a> 可用於 Angular 17，而且是使用控制流程指令（例如 *ngFor、*ngIf 和 *ngSwitch）的簡化方式。</p>
<p>新的語法已內建至範本，因此您不再需要匯入 <code>CommonModule</code>。但等等，還有更多內容，有一個可用於將所有舊程式碼移轉至使用 Angular 17 發行版的全新控制流程語法的移轉。使用下列指令執行示意圖：</p>
