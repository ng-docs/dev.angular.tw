    <p>當 Angular 執行階段注入一個打算使用 <code>multi: true</code> 的 token，但卻發現不是陣列時，就會擲出這個錯誤。例如，<code>ENVIRONMENT_INITIALIZER</code> 應該要像這樣提供 <code>{provide: ENVIRONMENT_INITIALIZER, multi: true, useValue: () =&gt; {...}}</code>。</p>
