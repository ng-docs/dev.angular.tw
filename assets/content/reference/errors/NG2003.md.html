    <h1 tabindex="-1">遺失 Token</h1>

    <p>編譯時沒有建構函式參數的注入代幣。<a href="api/core/InjectionToken">InjectionTokens</a> 是可用於相依性注入提供者的代幣。</p>

  <h2 id="">偵錯錯誤</h2>
  <a href="#" class="docs-anchor" tabindex="-1" aria-label="Link to 偵錯錯誤"></a>
  <p>看看拋出錯誤的參數，以及類的所有使用情況。
當建構函式定義了具有基本類型（例如 <code>string</code>、<code>number</code>、<code>boolean</code> 和 <code>Object</code>）的參數時，通常會拋出此錯誤。</p>
<p>使用 <code>@angular/core</code> 中的 <code>@Injectable</code> 方法或 <code>@Inject</code> 裝飾器，以確保您注入的類型被具體化 (具有執行時期表示)。務必為此裝飾器新增提供者，以避免拋出 <a href="errors/NG0201">NG0201: 未找到提供者</a>。</p>
