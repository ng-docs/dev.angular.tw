    <p>屬性或特徵無法在編譯期間解析。</p>
<p>此錯誤在嘗試繫結至不存在的屬性時發生。
任何屬性繫結都必須對應至：</p>

  <ul class="docs-list">
    <li>HTML 元素上的原生屬性，或</li>
<li>應用於該元素的元件或指令的 <code>@Input()</code> 屬性。</li>

  </ul>
  <p>這個的執行時期錯誤是 <code>NG0304: &#39;${tagName}&#39; 不是已知的元素: &amp;hellip;&#39;</code>。</p>

  <h2 id="">偵錯錯誤</h2>
  <a href="#" class="docs-anchor" tabindex="-1" aria-label="Link to 偵錯錯誤"></a>
  <p>請參閱特定 <a href="guide/templates">binding syntax</a> 使用的文件。這通常是錯字或不正確的匯入。
可能還有缺少具備屬性選擇器「名稱」的方向或缺少輸入。</p>
