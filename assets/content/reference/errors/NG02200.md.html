    <h1 tabindex="-1">缺少 Iterable Differ</h1>
    <a class="docs-github-links" target="_blank" href="https://github.com/angular/angular/edit/main/adev/src/content/reference/errors/NG02200.md" title="Edit this page" aria-label="Edit this page">

    <p><code>NgFor</code> 無法為傳入的值找到可叠代差異。請確保它是一個可叠代對象，如 <code>Array</code>。</p>

  <h2 id="">偵錯錯誤</h2>
  <a href="#" class="docs-anchor" tabindex="-1" aria-label="Link to 偵錯錯誤"></a>
  <p>當在範本中使用 ngFor 時，您必須使用某種 Iterable，例如 <code>Array</code>、<code>Set</code>、<code>Map</code> 等。
如果您嘗試遍歷物件中的鍵，您應該改看 <a href="/api/common/KeyValuePipe">KeyValue pipe</a>。</p>
