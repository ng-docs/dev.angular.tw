    <h1 tabindex="-1">設定值之前存取所需的輸入。</h1>
    <a class="docs-github-links" target="_blank" href="https://github.com/angular/angular/edit/main/adev/src/content/reference/errors/NG0950.md" title="Edit this page" aria-label="Edit this page">

    <p>@description
存取所需的輸入，但未繫結任何值。</p>
<p>這可能會在指令或元件中過早存取所需輸入時發生。
這通常在將輸入視為類別結構的一部分時發生。</p>
<p>輸入保證在 <code>ngOnInit</code> 生命週期掛鉤和之後可用。</p>

  <h2 id="">修正錯誤</h2>
  <a href="#" class="docs-anchor" tabindex="-1" aria-label="Link to 修正錯誤"></a>
  <p>在響應式內容中存取所需的輸入。
例如，在範本本身、在 <code>computed</code> 內部或在效果內部。</p>
<p>或者，在 <code>ngOnInit</code> 生命週期掛鉤內或稍後存取輸入。</p>
